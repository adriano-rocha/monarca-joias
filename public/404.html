<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — Monarca Jóias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0D0D0D;
      color: #F5F0E8;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    .bg-logo {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
    }

    .bg-logo img {
      width: min(600px, 90vw);
      opacity: 0.04;
      user-select: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .divider-line {
      width: 64px;
      height: 1px;
      background-color: #BFA26A;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #BFA26A;
    }

    .logo img {
      height: 80px;
      object-fit: contain;
    }

    .error-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 300;
      color: #BFA26A;
      line-height: 1;
      letter-spacing: 0.1em;
      opacity: 0.6;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 400;
      color: #F5F0E8;
      line-height: 1.3;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: #BFA26A;
      opacity: 0.8;
      max-width: 360px;
      line-height: 1.7;
    }

    .cta {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      background-color: #BFA26A;
      color: #0D0D0D;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .cta:hover {
      opacity: 0.85;
    }

    .crown {
      font-size: 1.2rem;
      color: #BFA26A;
    }
  </style>
</head>
<body>

  <div class="bg-logo">
    <img src="/images/logo_about.png" alt="" />
  </div>

  <div class="content">

    <div class="divider">
      <div class="divider-line"></div>
      <span class="tagline">Monarca Jóias</span>
      <div class="divider-line"></div>
    </div>

    <div class="logo">
      <img src="/images/logo.png" alt="Monarca Jóias" />
    </div>

    <div class="error-number">404</div>

    <h1 class="title">Página não encontrada</h1>

    <p class="subtitle">
      Esta página não existe ou foi removida.<br />
      Volte para o início e continue explorando nossas joias.
    </p>

    <a href="/" class="cta">Voltar ao início</a>

    <div class="divider" style="margin-top: 0.5rem;">
      <div class="divider-line"></div>
      <span class="crown">👑</span>
      <div class="divider-line"></div>
    </div>

  </div>

</body>
</html>
